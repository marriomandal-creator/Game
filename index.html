<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Professional Ludo</title>
                <link rel="stylesheet" href="style.css">
                </head>
                <body>

                    <div class="game-container">
                            <h1>Ludo Master</h1>
                                    
                                            <div class="ludo-board">
                                                        <!-- Top Row -->
                                                                    <div class="home red-home">
                                                                                    <div class="white-box">
                                                                                                        <div class="token red"></div><div class="token red"></div>
                                                                                                                            <div class="token red"></div><div class="token red"></div>
                                                                                                                                            </div>
                                                                                                                                                        </div>
                                                                                                                                                                    <div class="track top-track" id="top-track"></div>
                                                                                                                                                                                <div class="home green-home">
                                                                                                                                                                                                <div class="white-box">
                                                                                                                                                                                                                    <div class="token green"></div><div class="token green"></div>
                                                                                                                                                                                                                                        <div class="token green"></div><div class="token green"></div>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                <!-- Middle Row -->
                                                                                                                                                                                                                                                                                            <div class="track left-track" id="left-track"></div>
                                                                                                                                                                                                                                                                                                        <div class="center-home">
                                                                                                                                                                                                                                                                                                                        <div class="triangle red-triangle"></div>
                                                                                                                                                                                                                                                                                                                                        <div class="triangle green-triangle"></div>
                                                                                                                                                                                                                                                                                                                                                        <div class="triangle yellow-triangle"></div>
                                                                                                                                                                                                                                                                                                                                                                        <div class="triangle blue-triangle"></div>
                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                <div class="track right-track" id="right-track"></div>

                                                                                                                                                                                                                                                                                                                                                                                                            <!-- Bottom Row -->
                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="home blue-home">
                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="white-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="token blue"></div><div class="token blue"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="token blue"></div><div class="token blue"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="track bottom-track" id="bottom-track"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="home yellow-home">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="white-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="token yellow"></div><div class="token yellow"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="token yellow"></div><div class="token yellow"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="controls">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="dice" id="dice">🎲</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p id="status">Red's Turn!</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
